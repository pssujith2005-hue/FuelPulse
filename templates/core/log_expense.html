{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="stats-card">
            <h4 class="text-white fw-bold mb-4">
                <i class="fas fa-file-invoice-dollar text-primary me-2"></i> Log Expense
            </h4>
            <form method="post" enctype="multipart/form-data"> {% csrf_token %}
                </form>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                {% if form.errors %}
                    <div class="alert alert-danger">
                        Please correct the errors below.
                    </div>
                {% endif %}

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="text-muted small">Vehicle</label>
                        {{ form.vehicle }}
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small">Date</label>
                        {{ form.date }}
                    </div>
                    
                    <div class="col-md-6">
                        <label class="text-muted small">Expense Category</label>
                        {{ form.expense_type }}
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small">Total Cost (₹)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted">₹</span>
                            {{ form.amount }}
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="text-muted small">Description / Notes</label>
                        {{ form.notes }}
                    </div>
                </div>

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-primary px-4 fw-bold">Save Expense</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
